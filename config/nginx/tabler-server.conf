# Example nginx site for tabler-server.
# Terminates TLS and forwards HTTP + WebSocket upgrades to the local server.
# Use certbot to obtain the certificate:  certbot --nginx -d apps.example.com

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name apps.example.com;
    # certbot will add the 443 server block and the http->https redirect.

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # WebSocket upgrade — required by the tabler reactive bridge (/ws).
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Keep long-lived sessions alive.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}

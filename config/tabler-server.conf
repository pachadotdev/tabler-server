# tabler-server configuration.
# Format: one `key value` per line. Lines starting with # are comments.

# --- Front listener (put nginx/TLS in front of this) ---
listen 127.0.0.1
port 3000

# --- Admin dashboard (htop-like status page) ---
admin_enabled 1          # set to 0 to disable
admin_listen 127.0.0.1   # keep on loopback; front it with nginx/auth if remote
admin_port 3001

# --- Where apps live: one subdirectory per app, each with an app.R ---
apps_dir /srv/tabler-server/apps

# --- How workers are launched ---
rscript /usr/bin/Rscript
worker_script /opt/tabler-server/share/worker.R
# run_as tabler          # uncomment to drop privileges when started as root
log_dir /var/log/tabler-server

# --- Worker loopback port pool ---
worker_port_base 34000
worker_port_count 256

# --- Session lifecycle (seconds) ---
idle_timeout 300          # kill a worker after 5 min of inactivity
disconnect_grace 15       # kill a worker 15s after its tab (WebSocket) closes
worker_start_timeout 20   # wait up to 20s for a worker to accept traffic
